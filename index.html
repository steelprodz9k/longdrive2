<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will's Long Drive Game</title>
    <style>
        :root {
            --primary: #00ffcc;
            --bg-glass: rgba(10, 15, 25, 0.9);
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #050a15;
            font-family: 'Inter', system-ui, sans-serif;
            user-select: none;
        }
        canvas { display: block; }
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column;
            justify-content: space-between; padding: 1.5rem; box-sizing: border-box;
        }
        .glass-panel {
            background: var(--bg-glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; padding: 1.2rem; color: white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            text-align: center; max-width: 340px; margin: 0 auto;
            pointer-events: auto;
        }
        .club-selector { display: flex; gap: 6px; justify-content: center; margin-top: 10px; }
        .club-btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: #64748b; padding: 6px 10px; border-radius: 8px; cursor: pointer;
            font-size: 10px; font-weight: 800; transition: 0.2s;
        }
        .club-btn.active { background: var(--primary); color: #050a15; border-color: var(--primary); }
        h1 { margin: 0; font-size: 16px; letter-spacing: 3px; color: var(--primary); text-transform: uppercase; }
        .label { font-size: 9px; color: #94a3b8; text-transform: uppercase; margin-top: 12px; display: block; text-align: left;}
        .meter-container {
            width: 100%; height: 6px; background: rgba(255,255,255,0.1);
            border-radius: 3px; margin: 4px 0; position: relative; overflow: hidden;
        }
        .meter-fill { height: 100%; width: 0%; background: var(--primary); box-shadow: 0 0 10px var(--primary); }
        .stats { font-size: 3.5rem; font-weight: 900; margin: 0; color: #fff; }
        button.main-btn {
            background: #fff; color: #050a15; border: none; padding: 12px;
            font-size: 13px; font-weight: 800; border-radius: 12px; cursor: pointer;
            width: 100%; margin-top: 10px; text-transform: uppercase;
        }
        button.main-btn:hover { background: var(--primary); }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div class="glass-panel">
            <h1>Apex Long Drive</h1>
            <div class="club-selector">
                <div class="club-btn active" onclick="setClub('driver')" id="btn-driver">DRIVER</div>
                <div class="club-btn" onclick="setClub('wood')" id="btn-wood">3-WOOD</div>
                <div class="club-btn" onclick="setClub('iron')" id="btn-iron">7-IRON</div>
            </div>

            <span class="label">Power Output</span>
            <div class="meter-container"><div class="meter-fill" id="powerMeter"></div></div>
            
            <span class="label">Impact Accuracy</span>
            <div class="meter-container">
                <div class="meter-fill" id="accuracyMeter" style="width: 50%; background: #3b82f6;"></div>
                <div style="position:absolute; left:50%; top:0; bottom:0; width:2px; background:#fff;"></div>
            </div>
            <div id="instruction" style="font-size: 11px; margin-top: 10px; color: #94a3b8;">CLICK TO TEE OFF</div>
        </div>

        <div class="glass-panel" id="result-panel" style="opacity: 0; pointer-events: none; transform: translateY(20px); transition: 0.4s;">
            <span class="label" style="text-align:center">Total Distance</span>
            <p class="stats" id="distanceText">0 YDS</p>
            <button class="main-btn" onclick="resetGame()">Try Again</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const powerMeter = document.getElementById('powerMeter');
    const accuracyMeter = document.getElementById('accuracyMeter');
    const instruction = document.getElementById('instruction');
    const resultPanel = document.getElementById('result-panel');
    const distanceText = document.getElementById('distanceText');

    let width, height, groundLevel;
    let state = 'idle'; 
    let power = 0; let accuracy = 50; let meterDir = 1;
    let camera = { x: 0, y: 0 };
    let ball = { x: 100, y: 0, vx: 0, vy: 0, active: false, inAir: true };
    let trail = []; let particles = [];

    // Realistic Club Physics (Angles in Radians)
    const clubs = {
        driver: { angle: 0.18, spin: 0.0012, power: 45, bounce: 0.5, friction: 0.98 },
        wood:   { angle: 0.28, spin: 0.0025, power: 38, bounce: 0.4, friction: 0.97 },
        iron:   { angle: 0.55, spin: 0.0080, power: 30, bounce: 0.2, friction: 0.94 }
    };
    let currentClub = clubs.driver;

    function resize() {
        width = window.innerWidth; height = window.innerHeight;
        canvas.width = width; canvas.height = height;
        groundLevel = height - 100;
    }
    window.addEventListener('resize', resize);
    resize();

    function setClub(type) {
        if (state !== 'idle' && state !== 'landed') return;
        document.querySelectorAll('.club-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + type).classList.add('active');
        currentClub = clubs[type];
        resetGame();
    }

    function launch() {
        ball.active = true;
        ball.inAir = true;
        const pMod = 0.5 + (power / 100) * 0.5; // Scale power properly
        const accMod = 1 - (Math.abs(accuracy - 50) / 100); // Penalty for inaccuracy
        
        const force = currentClub.power * pMod * accMod;
        ball.vx = Math.cos(currentClub.angle) * force;
        ball.vy = -Math.sin(currentClub.angle) * force;
        
        spawnParticles(ball.x, ball.y, '#fff', 15);
    }

    function update() {
        if (state === 'power') {
            power += 2.2 * meterDir;
            if (power >= 100 || power <= 0) meterDir *= -1;
            powerMeter.style.width = power + '%';
        } else if (state === 'accuracy') {
            accuracy += 4 * meterDir;
            if (accuracy >= 100 || accuracy <= 0) meterDir *= -1;
            accuracyMeter.style.width = accuracy + '%';
        } else if (ball.active) {
            if (ball.inAir) {
                ball.vy += 0.22; // Gravity
                ball.vx *= 0.994; // Air drag
                // Simulate backspin lift
                ball.vy -= ball.vx * currentClub.spin;
            } else {
                ball.vx *= currentClub.friction;
            }

            ball.x += ball.vx;
            ball.y += ball.vy;

            if (ball.y >= groundLevel) {
                ball.y = groundLevel;
                if (Math.abs(ball.vy) > 0.5) {
                    ball.vy = -ball.vy * currentClub.bounce;
                    ball.vx *= 0.85;
                    spawnParticles(ball.x, ball.y, '#4ade80', 3);
                } else {
                    ball.vy = 0; ball.inAir = false;
                }
                if (Math.abs(ball.vx) < 0.2) {
                    ball.vx = 0; ball.active = false; state = 'landed';
                    distanceText.innerText = Math.floor((ball.x - 100) / 9) + " YDS";
                    resultPanel.style.opacity = '1';
                    resultPanel.style.pointerEvents = 'auto';
                    resultPanel.style.transform = 'translateY(0)';
                }
            }
            if (ball.active) trail.push({x: ball.x, y: ball.y});
            if (trail.length > 40) trail.shift();
        }

        // Smooth Camera Follow
        let camTargetX = ball.x - width/4;
        let camTargetY = Math.min(0, ball.y - height/2);
        camera.x += (camTargetX - camera.x) * 0.1;
        camera.y += (camTargetY - camera.y) * 0.05;

        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= 0.02;
            if (p.life <= 0) particles.splice(i, 1);
        });
    }

    function draw() {
        ctx.fillStyle = '#050a15';
        ctx.fillRect(0, 0, width, height);

        // Parallax Mountains
        drawMnts(0.1, '#1e293b', 150);
        drawMnts(0.25, '#0f172a', 80);

        ctx.save();
        ctx.translate(-camera.x, -camera.y);

        // Ground
        ctx.fillStyle = '#064e3b';
        ctx.fillRect(camera.x, groundLevel, width, height);
        
        // Grass Stripes
        ctx.fillStyle = 'rgba(255,255,255,0.02)';
        for(let i=0; i < ball.x + width; i+=200) ctx.fillRect(i, groundLevel, 100, height);

        // Trail
        if (trail.length > 1) {
            ctx.strokeStyle = 'rgba(0, 255, 204, 0.3)';
            ctx.lineWidth = 2; ctx.beginPath();
            ctx.moveTo(trail[0].x, trail[0].y);
            trail.forEach(p => ctx.lineTo(p.x, p.y));
            ctx.stroke();
        }

        // Ball
        ctx.fillStyle = '#fff';
        ctx.shadowBlur = 10; ctx.shadowColor = '#00ffcc';
        ctx.beginPath(); ctx.arc(ball.x, ball.y, 4, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;

        particles.forEach(p => {
            ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
            ctx.fillRect(p.x, p.y, 2, 2);
        });
        ctx.globalAlpha = 1;
        ctx.restore();
    }

    function drawMnts(speed, color, base) {
        ctx.fillStyle = color; ctx.beginPath();
        let step = 120; let off = (camera.x * speed) % (step * 2);
        ctx.moveTo(0, height);
        for (let x = -step * 2; x < width + step * 2; x += step) {
            let h = base + Math.sin((x + camera.x * speed) * 0.005) * 40;
            ctx.lineTo(x - off, (groundLevel - camera.y) - h);
        }
        ctx.lineTo(width, height); ctx.fill();
    }

    function spawnParticles(x, y, color, count) {
        for(let i=0; i<count; i++) particles.push({x, y, vx: (Math.random()-0.5)*6, vy: (Math.random()-1)*6, life: 1, color});
    }

    function resetGame() {
        state = 'idle'; power = 0; accuracy = 50;
        ball = { x: 100, y: groundLevel, vx: 0, vy: 0, active: false, inAir: true };
        camera = { x: 0, y: 0 }; trail = [];
        resultPanel.style.opacity = '0'; resultPanel.style.transform = 'translateY(20px)';
        instruction.innerText = "CLICK TO TEE OFF";
    }

    window.addEventListener('mousedown', (e) => {
        if(e.target.closest('.glass-panel')) return;
        if (state === 'idle' || state === 'landed') { state = 'power'; instruction.innerText = "SET POWER..."; }
        else if (state === 'power') { state = 'accuracy'; instruction.innerText = "SET ACCURACY..."; }
        else if (state === 'accuracy') { state = 'flying'; instruction.innerText = "BOOM!"; launch(); }
    });

    function loop() { update(); draw(); requestAnimationFrame(loop); }
    resetGame(); loop();
</script>
</body>
</html>
