<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Long Drive: Apex</title>
    <style>
        :root {
            --primary: #00ffcc;
            --bg-glass: rgba(25, 30, 45, 0.7);
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem;
            box-sizing: border-box;
        }
        .glass-panel {
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 1.5rem;
            color: white;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 400px;
            margin: 0 auto;
            pointer-events: auto;
        }
        h1 { margin: 0 0 10px 0; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; color: var(--primary); }
        .meter-container {
            width: 100%; height: 30px; background: rgba(0,0,0,0.5);
            border-radius: 15px; margin: 15px 0; position: relative;
            overflow: hidden; border: 2px solid rgba(255,255,255,0.2);
        }
        .meter-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #ff3366, #ffcc00, #00ffcc);
            transition: width 0.05s linear;
        }
        .meter-target {
            position: absolute; top: 0; height: 100%; width: 10px;
            background: white; left: 50%; transform: translateX(-50%);
            box-shadow: 0 0 10px white;
        }
        .stats {
            font-size: 3rem; font-weight: bold; text-shadow: 0 0 20px var(--primary);
            margin: 0;
        }
        .sub-text { font-size: 1rem; color: #ccc; margin-bottom: 10px; }
        button {
            background: var(--primary); color: #111; border: none;
            padding: 12px 30px; font-size: 18px; font-weight: bold;
            border-radius: 30px; cursor: pointer; text-transform: uppercase;
            transition: all 0.2s; box-shadow: 0 0 15px var(--primary);
        }
        button:hover { transform: scale(1.05); box-shadow: 0 0 25px var(--primary); }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div class="glass-panel" style="margin-top: 0;">
            <h1>Long Drive</h1>
            <div class="sub-text" id="instruction">Click anywhere or press SPACE to set Power</div>
            
            <div style="text-align: left; font-size: 12px; margin-bottom: 5px;">POWER</div>
            <div class="meter-container">
                <div class="meter-fill" id="powerMeter"></div>
                <div class="meter-target" style="left: 95%;"></div>
            </div>

            <div style="text-align: left; font-size: 12px; margin-bottom: 5px;">ACCURACY</div>
            <div class="meter-container">
                <div class="meter-fill" id="accuracyMeter" style="width: 50%; background: #00ffcc;"></div>
                <div class="meter-target" style="left: 50%;"></div>
            </div>
        </div>

        <div class="glass-panel" id="result-panel" style="margin-bottom: 0; opacity: 0; transition: opacity 0.5s;">
            <div class="sub-text">TOTAL DISTANCE</div>
            <p class="stats" id="distanceText">0 YDS</p>
            <button onclick="resetGame()" style="margin-top: 15px;">Swing Again</button>
        </div>
    </div>

<script>
// ... (Keep existing variables, just update these specific functions)

    function drawScenery() {
        // 1. Dynamic Sky Gradient (Moves slightly with camera for depth)
        let sky = ctx.createLinearGradient(0, -camera.y * 0.5, 0, height - camera.y);
        sky.addColorStop(0, "#0f172a"); // Dark space blue
        sky.addColorStop(0.5, "#1e293b"); // Slate
        sky.addColorStop(1, "#334155"); 
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, width, height);

        // 2. Distant Sun/Moon
        ctx.fillStyle = "rgba(255, 255, 255, 0.15)";
        ctx.beginPath();
        ctx.arc(width * 0.8 - (camera.x * 0.05), 150 - (camera.y * 0.1), 60, 0, Math.PI * 2);
        ctx.fill();

        // 3. PARALLAX MOUNTAINS (Synced to Ground)
        // We draw two layers of mountains for depth
        drawMountainRange(0.1, "#1e293b", 300, 100); // Back layer (slower)
        drawMountainRange(0.25, "#0f172a", 200, 150); // Front layer (faster)

        // 4. THE FIXED GROUND
        ctx.save();
        ctx.translate(0, -camera.y);
        
        // Main Grass
        ctx.fillStyle = "#14532d"; 
        ctx.fillRect(0, groundLevel, width, height + camera.y + 500);

        // Mowed Stripes (Locked to World X)
        ctx.fillStyle = "rgba(255,255,255,0.03)";
        let stripeWidth = 150;
        let worldStart = Math.floor(camera.x / (stripeWidth * 2)) * (stripeWidth * 2);
        for (let x = worldStart - stripeWidth * 2; x < worldStart + width + stripeWidth; x += stripeWidth * 2) {
            ctx.fillRect(x - camera.x, groundLevel, stripeWidth, 2000);
        }
        ctx.restore();
    }

    function drawMountainRange(speed, color, baseHeight, variance) {
        ctx.save();
        ctx.fillStyle = color;
        ctx.beginPath();
        
        // Start at the left of screen, locked to the ground level minus camera Y
        ctx.moveTo(0, groundLevel - camera.y);

        let step = 120;
        // Offset the start point based on camera movement to create parallax
        let offset = (camera.x * speed) % (step * 2);
        
        for (let i = -step * 2; i < width + step * 2; i += step) {
            let x = i - offset;
            // The "y" is calculated relative to groundLevel
            // We use a pseudo-random sine wave so the mountains stay consistent
            let peakHeight = baseHeight + Math.sin(i * 0.01) * variance;
            ctx.lineTo(x, (groundLevel - camera.y) - peakHeight);
            ctx.lineTo(x + step/2, (groundLevel - camera.y) - (peakHeight * 0.6));
        }

        ctx.lineTo(width, groundLevel - camera.y);
        ctx.lineTo(0, groundLevel - camera.y);
        ctx.fill();
        ctx.restore();
    }

    function updatePhysics() {
        if (state === 'power') {
            power += 2 * meterDir;
            if (power > 100 || power < 0) meterDir *= -1;
            powerMeter.style.width = power + '%';
        } 
        else if (state === 'accuracy') {
            accuracy += 3 * meterDir;
            if (accuracy > 100 || accuracy < 0) meterDir *= -1;
            accuracyMeter.style.width = accuracy + '%';
        }
        else if (state === 'flying' || state === 'landed') {
            if (state === 'flying') {
                ball.vy += gravity;
                ball.vx *= friction;
                ball.x += ball.vx;
                ball.y += ball.vy;

                if (trail.length === 0 || Math.abs(trail[trail.length-1].x - ball.x) > 5) {
                    trail.push({x: ball.x, y: ball.y});
                }

                if (ball.y >= groundLevel) {
                    ball.y = groundLevel;
                    ball.vy = -ball.vy * bounceFriction;
                    ball.vx *= 0.7;
                    spawnParticles(ball.x, ball.y, '#4ade80', 8, 0.4);

                    if (Math.abs(ball.vx) < 0.2 && Math.abs(ball.vy) < 0.5) {
                        ball.vx = 0; ball.vy = 0;
                        state = 'landed';
                        showResults();
                    }
                }
            }
            
            // CAMERA LOGIC: Always keep the ground in view
            // Horizontal follow
            let targetCamX = ball.x - width / 4;
            camera.x += (targetCamX - camera.x) * 0.1;

            // Vertical follow: Only follow the ball UP, stop at ground level
            let ballHeightFromGround = groundLevel - ball.y;
            let targetCamY = 0;
            
            if (ballHeightFromGround > height / 3) {
                targetCamY = -(ballHeightFromGround - height / 3);
            }
            
            camera.y += (targetCamY - camera.y) * 0.05;
        }

        // Particles
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.vy += gravity * 0.5;
            p.life -= 0.02;
            if (p.life <= 0) particles.splice(i, 1);
        }
    }

</script>
</body>
</html>
