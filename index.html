<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Long Drive: Apex</title>
    <style>
        :root {
            --primary: #00ffcc;
            --bg-glass: rgba(25, 30, 45, 0.7);
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem;
            box-sizing: border-box;
        }
        .glass-panel {
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 1.5rem;
            color: white;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 400px;
            margin: 0 auto;
            pointer-events: auto;
        }
        h1 { margin: 0 0 10px 0; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; color: var(--primary); }
        .meter-container {
            width: 100%; height: 30px; background: rgba(0,0,0,0.5);
            border-radius: 15px; margin: 15px 0; position: relative;
            overflow: hidden; border: 2px solid rgba(255,255,255,0.2);
        }
        .meter-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #ff3366, #ffcc00, #00ffcc);
            transition: width 0.05s linear;
        }
        .meter-target {
            position: absolute; top: 0; height: 100%; width: 10px;
            background: white; left: 50%; transform: translateX(-50%);
            box-shadow: 0 0 10px white;
        }
        .stats {
            font-size: 3rem; font-weight: bold; text-shadow: 0 0 20px var(--primary);
            margin: 0;
        }
        .sub-text { font-size: 1rem; color: #ccc; margin-bottom: 10px; }
        button {
            background: var(--primary); color: #111; border: none;
            padding: 12px 30px; font-size: 18px; font-weight: bold;
            border-radius: 30px; cursor: pointer; text-transform: uppercase;
            transition: all 0.2s; box-shadow: 0 0 15px var(--primary);
        }
        button:hover { transform: scale(1.05); box-shadow: 0 0 25px var(--primary); }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div class="glass-panel" style="margin-top: 0;">
            <h1>Long Drive</h1>
            <div class="sub-text" id="instruction">Click anywhere or press SPACE to set Power</div>
            
            <div style="text-align: left; font-size: 12px; margin-bottom: 5px;">POWER</div>
            <div class="meter-container">
                <div class="meter-fill" id="powerMeter"></div>
                <div class="meter-target" style="left: 95%;"></div>
            </div>

            <div style="text-align: left; font-size: 12px; margin-bottom: 5px;">ACCURACY</div>
            <div class="meter-container">
                <div class="meter-fill" id="accuracyMeter" style="width: 50%; background: #00ffcc;"></div>
                <div class="meter-target" style="left: 50%;"></div>
            </div>
        </div>

        <div class="glass-panel" id="result-panel" style="margin-bottom: 0; opacity: 0; transition: opacity 0.5s;">
            <div class="sub-text">TOTAL DISTANCE</div>
            <p class="stats" id="distanceText">0 YDS</p>
            <button onclick="resetGame()" style="margin-top: 15px;">Swing Again</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // UI Elements
    const powerMeter = document.getElementById('powerMeter');
    const accuracyMeter = document.getElementById('accuracyMeter');
    const instruction = document.getElementById('instruction');
    const resultPanel = document.getElementById('result-panel');
    const distanceText = document.getElementById('distanceText');

    // Game Variables
    let width, height;
    let state = 'idle'; // idle, power, accuracy, flying, landed
    let power = 0;
    let accuracy = 50; 
    let meterDir = 1;
    let animFrame;
    
    // Physics & Camera
    let ball = { x: 0, y: 0, vx: 0, vy: 0, radius: 4, isActive: false };
    let camera = { x: 0, y: 0 };
    let gravity = 0.15;
    let friction = 0.98;
    let bounceFriction = 0.6;
    let groundLevel = 0;
    let scale = 1; // Meters to pixels

    // Visuals
    let trail = [];
    let particles = [];

    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        groundLevel = height - 150;
    }
    window.addEventListener('resize', resize);
    resize();

    function initGame() {
        state = 'power';
        power = 0;
        accuracy = 50;
        ball = { x: width / 4, y: groundLevel, vx: 0, vy: 0, radius: 5, isActive: false };
        camera = { x: 0, y: 0 };
        trail = [];
        particles = [];
        instruction.innerText = "Click to set POWER (Aim for 100%)";
        powerMeter.style.width = '0%';
        accuracyMeter.style.width = '50%';
        resultPanel.style.opacity = '0';
        resultPanel.style.pointerEvents = 'none';
        
        if(animFrame) cancelAnimationFrame(animFrame);
        loop();
    }

    function spawnParticles(x, y, color, count, speedFactor) {
        for(let i=0; i<count; i++) {
            particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 10 * speedFactor,
                vy: (Math.random() - 1) * 10 * speedFactor,
                life: 1,
                color: color,
                size: Math.random() * 4 + 2
            });
        }
    }

    // Input Handling
    function handleInput() {
        if (state === 'power') {
            state = 'accuracy';
            instruction.innerText = "Click to set ACCURACY (Aim for Center)";
            meterDir = 1;
        } else if (state === 'accuracy') {
            state = 'flying';
            instruction.innerText = "FLYING!";
            launchBall();
        }
    }
    window.addEventListener('mousedown', (e) => { if(e.target.tagName !== 'BUTTON') handleInput(); });
    window.addEventListener('keydown', (e) => { if(e.code === 'Space') handleInput(); });

    function launchBall() {
        ball.isActive = true;
        // Calculate physics based on meters
        let powerFactor = power / 100; // 0 to 1
        let accuracyFactor = (accuracy - 50) / 50; // -1 (left) to 1 (right)
        
        // Apply penalties for bad accuracy (slice/hook steals distance)
        let slicePenalty = Math.abs(accuracyFactor) * 0.3; 
        let finalPower = Math.max(0.1, powerFactor - slicePenalty);

        ball.vx = 15 + (20 * finalPower); // Forward speed
        ball.vy = -10 - (15 * powerFactor); // Upward speed
        
        // Screen shake/explosion
        spawnParticles(ball.x, ball.y, '#ffffff', 30, 1.5);
    }

    function updatePhysics() {
        if (state === 'power') {
            power += 2 * meterDir;
            if (power > 100 || power < 0) meterDir *= -1;
            powerMeter.style.width = power + '%';
        } 
        else if (state === 'accuracy') {
            accuracy += 3 * meterDir;
            if (accuracy > 100 || accuracy < 0) meterDir *= -1;
            accuracyMeter.style.width = accuracy + '%';
        }
        else if (state === 'flying') {
            ball.vy += gravity; // Gravity
            ball.vx *= friction; // Air resistance
            
            ball.x += ball.vx;
            ball.y += ball.vy;

            // Trail
            if (trail.length === 0 || Math.abs(trail[trail.length-1].x - ball.x) > 10) {
                trail.push({x: ball.x, y: ball.y});
            }

            // Ground Collision
            if (ball.y >= groundLevel) {
                ball.y = groundLevel;
                ball.vy = -ball.vy * bounceFriction;
                ball.vx *= 0.8; // Ground friction
                spawnParticles(ball.x, ball.y, '#55aa55', 10, 0.5);

                if (Math.abs(ball.vx) < 0.5 && Math.abs(ball.vy) < 1) {
                    ball.vx = 0; ball.vy = 0;
                    state = 'landed';
                    showResults();
                }
            }
            
            // Camera Follow (Smooth)
            let targetCamX = ball.x - width / 4;
            let targetCamY = ball.y - height / 1.5;
            if (targetCamY > 0) targetCamY = 0; // Don't let camera go below ground

            camera.x += (targetCamX - camera.x) * 0.1;
            camera.y += (targetCamY - camera.y) * 0.1;
        }

        // Update Particles
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.vy += gravity * 0.5;
            p.life -= 0.02;
            if (p.life <= 0) particles.splice(i, 1);
        }
    }

    function drawScenery() {
        // Sky Gradient
        let sky = ctx.createLinearGradient(0, 0, 0, height);
        sky.addColorStop(0, "#1a2a6c"); // Deep blue
        sky.addColorStop(0.5, "#b21f1f"); // Sunset red
        sky.addColorStop(1, "#fdbb2d"); // Sunset yellow
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, width, height);

        // Sun
        ctx.fillStyle = "rgba(255, 230, 100, 0.8)";
        ctx.beginPath();
        ctx.arc(width * 0.8, height * 0.4 - camera.y * 0.1, 80, 0, Math.PI * 2);
        ctx.fill();

        // Parallax Mountains
        ctx.fillStyle = "#2c3e50";
        ctx.beginPath();
        for(let i=0; i<width*3; i+=150) {
            let mntX = (i - (camera.x * 0.2)) % (width*2) - 200;
            ctx.lineTo(mntX, groundLevel - Math.abs(Math.sin(i)*200) - 50);
        }
        ctx.lineTo(width, groundLevel);
        ctx.lineTo(0, groundLevel);
        ctx.fill();

        // Ground
        ctx.fillStyle = "#27ae60"; // Grass green
        ctx.fillRect(0, groundLevel - camera.y, width, height);

        // Ground Stripes (Mowed Grass Effect)
        ctx.fillStyle = "rgba(0,0,0,0.05)";
        let stripeWidth = 200;
        let startX = -(camera.x % (stripeWidth * 2));
        for (let i = startX; i < width; i += stripeWidth * 2) {
            ctx.fillRect(i, groundLevel - camera.y, stripeWidth, height);
        }
    }

    function draw() {
        ctx.clearRect(0, 0, width, height);
        
        drawScenery();

        ctx.save();
        ctx.translate(-camera.x, -camera.y);

        // Draw Tee
        if (state !== 'idle') {
            ctx.fillStyle = "white";
            ctx.fillRect(width/4 - 2, groundLevel, 4, -10);
        }

        // Draw Trail
        if (trail.length > 1) {
            ctx.beginPath();
            ctx.moveTo(trail[0].x, trail[0].y);
            for(let i=1; i<trail.length; i++) ctx.lineTo(trail[i].x, trail[i].y);
            ctx.strokeStyle = "rgba(0, 255, 204, 0.5)";
            ctx.lineWidth = 4;
            ctx.lineCap = "round";
            ctx.stroke();
        }

        // Draw Particles
        particles.forEach(p => {
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.life;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
            ctx.fill();
            ctx.globalAlpha = 1;
        });

        // Draw Ball
        if (state !== 'idle') {
            ctx.fillStyle = "white";
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#00ffcc";
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0; // Reset
        }

        ctx.restore();
    }

    function loop() {
        updatePhysics();
        draw();
        animFrame = requestAnimationFrame(loop);
    }

    function showResults() {
        instruction.innerText = "NICE SHOT!";
        // Calculate yards (rough estimate based on pixels)
        let distanceInYards = Math.floor((ball.x - (width/4)) / 10);
        distanceText.innerText = distanceInYards + " YDS";
        
        resultPanel.style.opacity = '1';
        resultPanel.style.pointerEvents = 'auto';
    }

    function resetGame() {
        initGame();
    }

    // Start
    initGame();

</script>
</body>
</html>
