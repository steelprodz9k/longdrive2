<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will's Long Drive</title>
    <style>
        :root {
            --primary: #4ade80; /* "Masters" Green */
            --bg-glass: rgba(15, 20, 30, 0.95);
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #050a15;
            font-family: 'Inter', system-ui, sans-serif;
            user-select: none;
        }
        canvas { display: block; }
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column;
            justify-content: space-between; padding: 1.5rem; box-sizing: border-box;
        }
        .glass-panel {
            background: var(--bg-glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px; padding: 1rem; color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center; max-width: 320px; margin: 0 auto;
            pointer-events: auto;
        }
        .club-selector { display: flex; gap: 4px; justify-content: center; margin-top: 8px; }
        .club-btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: #94a3b8; padding: 6px 8px; border-radius: 6px; cursor: pointer;
            font-size: 9px; font-weight: 800; transition: 0.2s;
        }
        .club-btn.active { background: var(--primary); color: #050a15; border-color: var(--primary); }
        h1 { margin: 0; font-size: 14px; letter-spacing: 2px; color: #fff; text-transform: uppercase; }
        .label { font-size: 8px; color: #94a3b8; text-transform: uppercase; margin-top: 10px; display: block; text-align: left;}
        .meter-container {
            width: 100%; height: 6px; background: rgba(255,255,255,0.1);
            border-radius: 3px; margin: 4px 0; position: relative; overflow: hidden;
        }
        .meter-fill { height: 100%; width: 0%; background: var(--primary); }
        .stats { font-size: 3rem; font-weight: 900; margin: 0; color: #fff; line-height: 1; }
        .live-dist { position: absolute; top: 20px; right: 20px; color: var(--primary); font-weight: 800; font-size: 20px; text-shadow: 0 0 10px rgba(0,0,0,0.5); }
        button.main-btn {
            background: var(--primary); color: #050a15; border: none; padding: 10px;
            font-size: 12px; font-weight: 800; border-radius: 10px; cursor: pointer;
            width: 100%; margin-top: 10px; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="live-tracker" class="live-dist">0 YDS</div>
    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div class="glass-panel">
            <h1>Weekend Warrior Golf</h1>
            <div class="club-selector">
                <div class="club-btn active" onclick="setClub('driver')" id="btn-driver">DRIVER</div>
                <div class="club-btn" onclick="setClub('wood')" id="btn-wood">3-WOOD</div>
                <div class="club-btn" onclick="setClub('iron')" id="btn-iron">7-IRON</div>
            </div>

            <span class="label">Swing Speed</span>
            <div class="meter-container"><div class="meter-fill" id="powerMeter"></div></div>
            
            <span class="label">Strike Quality</span>
            <div class="meter-container">
                <div class="meter-fill" id="accuracyMeter" style="width: 50%; background: #60a5fa;"></div>
                <div style="position:absolute; left:50%; top:0; bottom:0; width:2px; background:#fff;"></div>
            </div>
            <div id="instruction" style="font-size: 10px; margin-top: 8px; color: #94a3b8;">CLICK TO START SWING</div>
        </div>

        <div class="glass-panel" id="result-panel" style="opacity: 0; pointer-events: none; transform: translateY(20px); transition: 0.4s;">
            <span class="label" style="text-align:center">Total Distance</span>
            <p class="stats" id="distanceText">0 YDS</p>
            <button class="main-btn" onclick="resetGame()">New Ball</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const powerMeter = document.getElementById('powerMeter');
    const accuracyMeter = document.getElementById('accuracyMeter');
    const instruction = document.getElementById('instruction');
    const resultPanel = document.getElementById('result-panel');
    const distanceText = document.getElementById('distanceText');
    const liveTracker = document.getElementById('live-tracker');

    let width, height, groundLevel;
    let state = 'idle'; 
    let power = 0; let accuracy = 50; let meterDir = 1;
    let camera = { x: 0, y: 0 };
    let ball = { x: 100, y: 0, vx: 0, vy: 0, active: false, inAir: true };
    let trail = []; let particles = [];

    // Real-world calibration for average male amateur (~90mph swing)
    // Yardage = (Pixels / 8.5)
    const clubs = {
        driver: { angle: 0.21, spin: 0.001, power: 32, bounce: 0.4, friction: 0.97 }, // 12 deg
        wood:   { angle: 0.28, spin: 0.002, power: 28, bounce: 0.3, friction: 0.95 }, // 16 deg
        iron:   { angle: 0.58, spin: 0.007, power: 22, bounce: 0.15, friction: 0.92 } // 33 deg
    };
    let currentClub = clubs.driver;

    function resize() {
        width = window.innerWidth; height = window.innerHeight;
        canvas.width = width; canvas.height = height;
        groundLevel = height - 100;
    }
    window.addEventListener('resize', resize);
    resize();

    function setClub(type) {
        if (state !== 'idle' && state !== 'landed') return;
        document.querySelectorAll('.club-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + type).classList.add('active');
        currentClub = clubs[type];
        resetGame();
    }

    function launch() {
        ball.active = true;
        ball.inAir = true;
        const pMod = 0.8 + (power / 100) * 0.2; // Amateur power variance is lower
        const accMod = 1 - (Math.abs(accuracy - 50) / 75); 
        
        const force = currentClub.power * pMod * accMod;
        ball.vx = Math.cos(currentClub.angle) * force;
        ball.vy = -Math.sin(currentClub.angle) * force;
    }

    function update() {
        if (state === 'power') {
            power += 2.5 * meterDir;
            if (power >= 100 || power <= 0) meterDir *= -1;
            powerMeter.style.width = power + '%';
        } else if (state === 'accuracy') {
            accuracy += 4 * meterDir;
            if (accuracy >= 100 || accuracy <= 0) meterDir *= -1;
            accuracyMeter.style.width = accuracy + '%';
        } else if (ball.active) {
            if (ball.inAir) {
                ball.vy += 0.25; // Slightly heavier gravity for realism
                ball.vx *= 0.992; // Higher air drag for non-pro ball speed
                ball.vy -= ball.vx * currentClub.spin;
            } else {
                ball.vx *= currentClub.friction;
            }

            ball.x += ball.vx;
            ball.y += ball.vy;

            // Live Distance Update
            let currentYds = Math.max(0, Math.floor((ball.x - 100) / 8.5));
            liveTracker.innerText = currentYds + " YDS";

            if (ball.y >= groundLevel) {
                ball.y = groundLevel;
                if (Math.abs(ball.vy) > 0.6) {
                    ball.vy = -ball.vy * currentClub.bounce;
                    ball.vx *= 0.75;
                } else {
                    ball.vy = 0; ball.inAir = false;
                }
                if (Math.abs(ball.vx) < 0.2) {
                    ball.vx = 0; ball.active = false; state = 'landed';
                    distanceText.innerText = currentYds + " YDS";
                    resultPanel.style.opacity = '1';
                    resultPanel.style.pointerEvents = 'auto';
                    resultPanel.style.transform = 'translateY(0)';
                }
            }
            if (ball.active && ball.vx > 1) trail.push({x: ball.x, y: ball.y});
            if (trail.length > 50) trail.shift();
        }

        camera.x += (ball.x - width/4 - camera.x) * 0.1;
        camera.y += (Math.min(0, ball.y - height/1.8) - camera.y) * 0.05;
    }

    function draw() {
        ctx.fillStyle = '#0a0f1a';
        ctx.fillRect(0, 0, width, height);

        // Simple Sky Gradient
        let sky = ctx.createLinearGradient(0, 0, 0, height);
        sky.addColorStop(0, '#0f172a');
        sky.addColorStop(1, '#1e293b');
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, width, height);

        ctx.save();
        ctx.translate(-camera.x, -camera.y);

        // Ground
        ctx.fillStyle = '#14532d';
        ctx.fillRect(camera.x, groundLevel, width, height);
        
        // Yardage Markers
        ctx.fillStyle = 'rgba(255,255,255,0.1)';
        ctx.textAlign = 'center';
        for(let i=0; i < ball.x + width + 1000; i += (8.5 * 50)) { // Every 50 yards
            let yds = Math.floor(i / 8.5);
            if (i > 0) {
                ctx.fillRect(i + 100, groundLevel, 2, 20);
                ctx.fillText(yds + "Y", i + 100, groundLevel + 40);
            }
        }

        // Ball & Trail
        if (trail.length > 1) {
            ctx.strokeStyle = 'rgba(74, 222, 128, 0.3)';
            ctx.lineWidth = 2; ctx.beginPath();
            ctx.moveTo(trail[0].x, trail[0].y);
            trail.forEach(p => ctx.lineTo(p.x, p.y));
            ctx.stroke();
        }

        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(ball.x, ball.y, 3.5, 0, Math.PI*2); ctx.fill();

        ctx.restore();
    }

    function resetGame() {
        state = 'idle'; power = 0; accuracy = 50;
        ball = { x: 100, y: groundLevel, vx: 0, vy: 0, active: false, inAir: true };
        camera = { x: 0, y: 0 }; trail = [];
        resultPanel.style.opacity = '0';
        liveTracker.innerText = "0 YDS";
        instruction.innerText = "CLICK TO START SWING";
    }

    window.addEventListener('mousedown', (e) => {
        if(e.target.closest('.glass-panel')) return;
        if (state === 'idle' || state === 'landed') { state = 'power'; instruction.innerText = "POWER..."; }
        else if (state === 'power') { state = 'accuracy'; instruction.innerText = "ACCURACY..."; }
        else if (state === 'accuracy') { state = 'flying'; launch(); }
    });

    function loop() { update(); draw(); requestAnimationFrame(loop); }
    resetGame(); loop();
</script>
</body>
</html>
