<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Long Drive Game</title>
    <style>
        :root {
            --primary: #00ffcc;
            --bg-glass: rgba(25, 30, 45, 0.85);
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #0f172a;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
        }
        canvas { display: block; }
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column;
            justify-content: space-between; padding: 2rem; box-sizing: border-box;
        }
        .glass-panel {
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px; padding: 1.5rem; color: white;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            text-align: center; max-width: 350px; margin: 0 auto;
            pointer-events: auto;
        }
        h1 { margin: 0 0 10px 0; font-size: 22px; text-transform: uppercase; letter-spacing: 2px; color: var(--primary); }
        .club-selector { display: flex; gap: 8px; justify-content: center; margin-bottom: 15px; }
        .club-btn {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: #ccc; padding: 6px 12px; border-radius: 20px; cursor: pointer;
            font-size: 10px; font-weight: bold; transition: all 0.2s;
        }
        .club-btn.active { background: var(--primary); color: #111; border-color: var(--primary); }
        .meter-container {
            width: 100%; height: 25px; background: rgba(0,0,0,0.5);
            border-radius: 12px; margin: 10px 0; position: relative;
            overflow: hidden; border: 1px solid rgba(255,255,255,0.2);
        }
        .meter-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #ff3366, #ffcc00, #00ffcc); }
        .stats { font-size: 3.5rem; font-weight: bold; text-shadow: 0 0 20px var(--primary); margin: 0; }
        .sub-text { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        button.action-btn {
            background: var(--primary); color: #111; border: none;
            padding: 12px 30px; font-size: 16px; font-weight: bold;
            border-radius: 30px; cursor: pointer; text-transform: uppercase;
            transition: all 0.2s; margin-top: 10px; width: 100%;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div class="glass-panel">
            <h1>Long Drive</h1>
            <div class="club-selector">
                <div class="club-btn active" onclick="setClub('driver')" id="btn-driver">DRIVER</div>
                <div class="club-btn" onclick="setClub('wood')" id="btn-wood">3-WOOD</div>
                <div class="club-btn" onclick="setClub('iron')" id="btn-iron">7-IRON</div>
            </div>
            <div class="sub-text" id="instruction">Click to Set Power</div>
            <div class="meter-container"><div class="meter-fill" id="powerMeter"></div></div>
            <div class="sub-text">Accuracy</div>
            <div class="meter-container">
                <div class="meter-fill" id="accuracyMeter" style="width: 50%; background: #00ffcc;"></div>
                <div style="position:absolute; left:50%; top:0; bottom:0; width:3px; background:#fff;"></div>
            </div>
        </div>

        <div class="glass-panel" id="result-panel" style="opacity: 0; pointer-events: none; transform: translateY(20px); transition: 0.5s;">
            <div class="sub-text">Total Distance</div>
            <p class="stats" id="distanceText">0 YDS</p>
            <button class="action-btn" onclick="resetGame()">Swing Again</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const powerMeter = document.getElementById('powerMeter');
    const accuracyMeter = document.getElementById('accuracyMeter');
    const instruction = document.getElementById('instruction');
    const resultPanel = document.getElementById('result-panel');
    const distanceText = document.getElementById('distanceText');

    let width, height, groundLevel;
    let state = 'idle'; 
    let power = 0; let accuracy = 50; let meterDir = 1;
    let camera = { x: 0, y: 0, zoom: 1.5 };
    let ball = { x: 100, y: 0, vx: 0, vy: 0, active: false, inAir: true };
    let trail = []; let clouds = []; let time = 0;

    // --- Golfer Rig State ---
    const golfer = {
        x: 60,
        swingAngle: 0, // 0 = address, -2 = top of backswing, 1 = impact
        isAnimating: false,
        phase: 'address'
    };

    const clubs = {
        driver: { angle: 0.21, spin: 0.001, power: 34, bounce: 0.45, friction: 0.97 },
        wood:   { angle: 0.28, spin: 0.002, power: 29, bounce: 0.35, friction: 0.95 },
        iron:   { angle: 0.58, spin: 0.007, power: 23, bounce: 0.2, friction: 0.92 }
    };
    let currentClub = clubs.driver;

    function resize() {
        width = window.innerWidth; height = window.innerHeight;
        canvas.width = width; canvas.height = height;
        groundLevel = height - 100;
        initClouds();
    }

    function initClouds() {
        clouds = [];
        for(let i=0; i<15; i++) {
            clouds.push({ x: Math.random()*width*5, y: Math.random()*height*0.4, w: Math.random()*250+150, h: Math.random()*50+30, speed: Math.random()*0.15+0.05 });
        }
    }

    window.addEventListener('resize', resize);
    resize();

    function setClub(type) {
        if (state !== 'idle' && state !== 'landed') return;
        document.querySelectorAll('.club-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + type).classList.add('active');
        currentClub = clubs[type];
        resetGame();
    }

    function launch() {
        ball.active = true;
        ball.inAir = true;
        const pMod = 0.85 + (power / 100) * 0.15;
        const accMod = 1 - (Math.abs(accuracy - 50) / 80); 
        const force = currentClub.power * pMod * accMod;
        ball.vx = Math.cos(currentClub.angle) * force;
        ball.vy = -Math.sin(currentClub.angle) * force;
    }

    function update() {
        time += 0.05;
        if (state === 'power') {
            power += 2.5 * meterDir;
            if (power >= 100 || power <= 0) meterDir *= -1;
            powerMeter.style.width = power + '%';
        } else if (state === 'accuracy') {
            accuracy += 4 * meterDir;
            if (accuracy >= 100 || accuracy <= 0) meterDir *= -1;
            accuracyMeter.style.width = accuracy + '%';
        } 
        
        // --- Golfer Animation Logic ---
        if (golfer.isAnimating) {
            if (golfer.phase === 'backswing') {
                golfer.swingAngle -= 0.08;
                if (golfer.swingAngle < -2.2) golfer.phase = 'downswing';
            } else if (golfer.phase === 'downswing') {
                let speed = 0.15 + (power / 100) * 0.2;
                golfer.swingAngle += speed;
                if (golfer.swingAngle >= 0.2 && !ball.active) launch(); // Impact
                if (golfer.swingAngle > 1.5) {
                    golfer.isAnimating = false;
                    golfer.phase = 'address';
                }
            }
        }

        if (ball.active) {
            if (ball.inAir) {
                ball.vy += 0.24; ball.vx *= 0.993; ball.vy -= ball.vx * currentClub.spin;
            } else { ball.vx *= currentClub.friction; }
            ball.x += ball.vx; ball.y += ball.vy;

            if (ball.y >= groundLevel) {
                ball.y = groundLevel;
                if (Math.abs(ball.vy) > 0.6) {
                    ball.vy = -ball.vy * currentClub.bounce;
                    ball.vx *= 0.8;
                } else { ball.vy = 0; ball.inAir = false; }
                if (Math.abs(ball.vx) < 0.2) {
                    ball.vx = 0; ball.active = false; state = 'landed';
                    distanceText.innerText = Math.floor((ball.x - 100) / 8.5) + " YDS";
                    resultPanel.style.opacity = '1'; resultPanel.style.pointerEvents = 'auto'; resultPanel.style.transform = 'translateY(0)';
                }
            }
            if (ball.active && ball.vx > 1) trail.push({x: ball.x, y: ball.y});
            if (trail.length > 40) trail.shift();
        }

        let targetZoom = 1.6;
        if (ball.active) {
            let speedFactor = Math.abs(ball.vx) / 30;
            let heightFactor = (groundLevel - ball.y) / 400;
            targetZoom = 1.6 - (speedFactor * 0.4) - (heightFactor * 0.3);
        }
        camera.zoom += (targetZoom - camera.zoom) * 0.05;
        let camX = ball.x * camera.zoom - width / 5; 
        let camY = ball.y * camera.zoom - height / 1.5;
        camera.x += (camX - camera.x) * 0.1;
        camera.y += (camY - camera.y) * 0.1;
    }

    function drawGolfer() {
        ctx.save();
        ctx.translate(golfer.x, groundLevel);
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';

        // Legs
        ctx.beginPath();
        ctx.moveTo(-10, 0); ctx.lineTo(-5, -20); ctx.lineTo(0, -35); // Left
        ctx.moveTo(10, 0); ctx.lineTo(5, -20); ctx.lineTo(0, -35);   // Right
        ctx.stroke();

        // Torso & Head
        ctx.beginPath();
        ctx.moveTo(0, -35); ctx.lineTo(0, -65);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(0, -75, 8, 0, Math.PI*2);
        ctx.stroke();

        // Arms & Club
        ctx.save();
        ctx.translate(0, -60); // Shoulder pivot
        ctx.rotate(golfer.swingAngle);
        
        // Arms
        ctx.beginPath();
        ctx.moveTo(0, 0); ctx.lineTo(15, 30);
        ctx.stroke();
        
        // Club Shaft
        ctx.strokeStyle = '#94a3b8';
        ctx.beginPath();
        ctx.moveTo(15, 30); ctx.lineTo(20, 80);
        ctx.stroke();
        
        // Club Head
        ctx.fillStyle = '#fff';
        ctx.fillRect(18, 80, 10, 5);
        
        ctx.restore();
        ctx.restore();
    }

    function drawFlag(x, yds) {
        ctx.save();
        const poleH = 60; const flagW = 35;
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(x, groundLevel); ctx.lineTo(x, groundLevel-poleH); ctx.stroke();
        const sway = Math.sin(time + x * 0.01) * 5;
        ctx.fillStyle = '#ff3366';
        ctx.beginPath(); ctx.moveTo(x, groundLevel-poleH); ctx.lineTo(x+flagW, groundLevel-poleH+12+sway); ctx.lineTo(x, groundLevel-poleH+25); ctx.fill();
        ctx.fillStyle = '#fff'; ctx.font = 'bold 12px Segoe UI'; ctx.textAlign = 'center'; ctx.fillText(yds, x, groundLevel+25);
        ctx.restore();
    }

    function draw() {
        let sky = ctx.createLinearGradient(0, 0, 0, height);
        sky.addColorStop(0, '#1e293b'); sky.addColorStop(1, '#334155');
        ctx.fillStyle = sky; ctx.fillRect(0, 0, width, height);

        ctx.fillStyle = "rgba(255,255,255,0.05)";
        clouds.forEach(c => {
            let cloudX = (c.x - camera.x * c.speed) % (width * 6);
            if (cloudX < -300) cloudX += width * 6;
            ctx.beginPath(); ctx.ellipse(cloudX, c.y, c.w, c.h, 0, 0, Math.PI * 2); ctx.fill();
        });

        ctx.save();
        ctx.translate(-camera.x, -camera.y);
        ctx.scale(camera.zoom, camera.zoom);

        ctx.fillStyle = '#14532d';
        ctx.fillRect(camera.x / camera.zoom - 500, groundLevel, 10000, 500);

        for(let y=50; y <= 600; y += 50) drawFlag(100 + (y * 8.5), y);
        if (trail.length > 1) {
            ctx.strokeStyle = 'rgba(0, 255, 204, 0.4)'; ctx.lineWidth = 2 / camera.zoom;
            ctx.beginPath(); ctx.moveTo(trail[0].x, trail[0].y); trail.forEach(p => ctx.lineTo(p.x, p.y)); ctx.stroke();
        }

        drawGolfer();

        if (ball.active || state === 'idle' || state === 'power' || state === 'accuracy') {
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(ball.x, ball.y, 4 / camera.zoom, 0, Math.PI * 2); ctx.fill();
        }

        ctx.restore();
    }

    function resetGame() {
        state = 'idle'; power = 0; accuracy = 50;
        ball = { x: 100, y: groundLevel, vx: 0, vy: 0, active: false, inAir: true };
        camera = { x: 0, y: 0, zoom: 1.5 }; trail = [];
        golfer.isAnimating = false; golfer.phase = 'address'; golfer.swingAngle = 0;
        resultPanel.style.opacity = '0';
        instruction.innerText = "CLICK TO SET POWER";
    }

    window.addEventListener('mousedown', (e) => {
        if(e.target.closest('.glass-panel')) return;
        if (state === 'idle' || state === 'landed') { state = 'power'; instruction.innerText = "SET POWER..."; }
        else if (state === 'power') { state = 'accuracy'; instruction.innerText = "SET ACCURACY..."; }
        else if (state === 'accuracy') { 
            state = 'flying'; 
            instruction.innerText = "BOOM!";
            golfer.isAnimating = true;
            golfer.phase = 'backswing';
        }
    });

    function loop() { update(); draw(); requestAnimationFrame(loop); }
    resetGame(); loop();
</script>
</body>
</html>
